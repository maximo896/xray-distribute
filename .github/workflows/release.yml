name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Install frontend dependencies
        run: cd web && npm ci

      - name: Build frontend
        run: cd web && npm run build

      - name: Build Server (Linux amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-s -w -X github.com/xray-distribute/internal/updater.Version=${{ steps.version.outputs.VERSION }}" \
            -o xray-distribute-server/xray-distribute ./cmd/server/

      - name: Build Agent (Windows amd64)
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -ldflags "-s -w -X github.com/xray-distribute/internal/updater.Version=${{ steps.version.outputs.VERSION }}" \
            -o xray-distribute-local/agent.exe ./cmd/agent/

      - name: Build Agent (Linux amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-s -w -X github.com/xray-distribute/internal/updater.Version=${{ steps.version.outputs.VERSION }}" \
            -o xray-distribute-local/agent ./cmd/agent/

      - name: Prepare server package
        run: |
          mkdir -p xray-distribute-server/data/certs
          cp data/xray.yaml data/plugin.xray.yaml data/module.xray.yaml xray-distribute-server/data/ || true
          cp data/certs/ca.crt data/certs/ca.key xray-distribute-server/data/certs/ 2>/dev/null || true

          cat > xray-distribute-server/config.yaml << 'CFG'
server:
  http: ":8090"
  api: ":8081"
  token: "your-secret-token"

xray:
  binary: "data/xray"
  config: ""
  data_dir: "./data"
  listen: "127.0.0.1:7777"
  level: ""
  plugins: ""
  webhook_url: ""
  auto_start: true

reverse:
  enabled: true
  mode: "interactsh"
  token: ""
  interactsh_server: "https://oast.fun"
  interactsh_token: ""
  adapter_listen: "127.0.0.1:9900"
  domain: ""
  listen_ip: "127.0.0.1"
  dns_port: 53
  http_port: 80
  dns_is_ns: false

webhook:
  enabled: true
  min_severity: "medium"

db:
  type: "sqlite"
  dsn: "./data/xray-distribute.db"

log:
  level: "info"
  output: "stdout"
CFG

          cat > xray-distribute-server/start.sh << 'SH'
#!/bin/bash
SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
cd "$SCRIPT_DIR"
if [ ! -f "data/xray" ]; then
    echo "[!] data/xray not found! Please download xray linux binary from:"
    echo "    https://github.com/chaitin/xray/releases"
    echo "    and put it in data/xray"
    exit 1
fi
chmod +x data/xray xray-distribute
echo "[*] Starting XRay-Distribute Server..."
./xray-distribute -config config.yaml
SH
          chmod +x xray-distribute-server/start.sh

      - name: Prepare local agent package
        run: |
          mkdir -p xray-distribute-local

          cat > xray-distribute-local/start-agent.bat << 'BAT'
@echo off
chcp 65001 >nul
echo ========================================
echo   XRay-Distribute Agent
echo ========================================
echo.
echo [*] First time: agent.exe xray://token@host:port
echo [*] After that: just run agent.exe
echo [*] Set browser proxy to 127.0.0.1:9090 to start scanning
echo.
agent.exe %1
pause
BAT

          cat > xray-distribute-local/start-agent.sh << 'SH'
#!/bin/bash
echo "========================================"
echo "  XRay-Distribute Agent"
echo "========================================"
echo ""
echo "[*] First time: ./agent xray://token@host:port"
echo "[*] After that: just run ./agent"
echo "[*] Set browser proxy to 127.0.0.1:9090 to start scanning"
echo ""
chmod +x agent
./agent "$@"
SH
          chmod +x xray-distribute-local/start-agent.sh

      - name: Download xray Linux binary
        run: |
          curl -sL https://github.com/chaitin/xray/releases/download/1.9.11/xray_linux_amd64.zip -o /tmp/xray_linux.zip || { echo "Failed to download xray"; exit 1; }
          unzip -o /tmp/xray_linux.zip -d /tmp/xray_linux || { echo "Failed to unzip xray"; exit 1; }
          # Find the xray binary - name may vary across releases
          XRAY_BIN=$(find /tmp/xray_linux -name 'xray*' -type f ! -name '*.zip' | head -1)
          cp "$XRAY_BIN" xray-distribute-server/data/xray || { echo "xray binary not found in zip"; ls /tmp/xray_linux/; exit 1; }
          chmod +x xray-distribute-server/data/xray

      - name: Package
        run: |
          cd xray-distribute-server && zip -r ../xray-distribute-server.zip . && cd ..
          cd xray-distribute-local && zip -r ../xray-distribute-local.zip . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            xray-distribute-server.zip
            xray-distribute-local.zip
          body: |
            ## XRay-Distribute 分布式漏洞扫描平台

            ### 服务器部署包 (xray-distribute-server.zip)
            - Linux x86_64 server二进制（前端已内置）
            - 内含 xray 1.9.11 Linux版
            - Web管理面板
            - Interactsh OOB回调检测
            - 自动检查更新并强制升级

            部署步骤：
            1. 解压到服务器
            2. 修改 `config.yaml` 中的 `token`
            3. `chmod +x start.sh && ./start.sh`
            4. 复制输出的 `agent xray://...` 命令给Agent端

            ### 本地Agent包 (xray-distribute-local.zip)
            - Windows + Linux agent二进制
            - 首次使用：`agent.exe xray://token@host:port`（从Server输出复制）
            - 之后直接运行 `agent.exe` 即可
            - 浏览器代理设为 `127.0.0.1:9090` 即可扫描
            - 自动检查更新并强制升级
