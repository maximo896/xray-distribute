# XRay-Distribute Agent配置
server:
  address: "http://your-server:8081"  # 远端Server地址
  token: "your-secret-token"          # 与Server配置的token一致

proxy:
  listen: ":9090"                     # 本地监听端口
  target: "http://localhost:8080"     # 转发目标地址（实际业务服务）
  cert_dir: "./certs"                 # CA证书存储目录

log:
  level: "info"
  output: "stdout"
